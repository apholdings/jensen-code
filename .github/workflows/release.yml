name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Version and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Ensure npm version for trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check (includes release-tooling gate)
        run: npm run check

      - name: Test
        run: npm test

      - name: Create Release Pull Request or prepare release state
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version:packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: publish
        env:
          NPM_CONFIG_PROVENANCE: "true"
          JENSEN_NPM_PUBLISH_AUTH_MODE: ${{ vars.JENSEN_NPM_PUBLISH_AUTH_MODE || 'auto' }}
          JENSEN_NPM_DIST_TAG: ${{ vars.JENSEN_NPM_DIST_TAG || 'fork' }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          rm -f "$HOME/.npmrc"
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "$HOME/.npmrc"
          fi
          node scripts/publish-unpublished-packages.mjs 2>&1 | tee publish-output.txt
          # Extract the JSON result block for downstream consumption
          sed -n '/^--- PUBLISH RESULT ---$/,/^$/p' publish-output.txt | tail -n +2 | head -n -1 > publish-result.json
          RELEASE_TAG=$(node -e "try { console.log(require('./publish-result.json').releaseTag || '') } catch { }")
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Push release tag
        if: steps.publish.outputs.release_tag != ''
        run: git push origin "${{ steps.publish.outputs.release_tag }}"
